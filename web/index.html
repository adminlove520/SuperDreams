<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xiaoxi-dreams Dashboard</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #16161d;
      --border: #2a2a35;
      --text: #e4e4e7;
      --text-dim: #71717a;
      --accent: #a855f7;
      --accent-dim: #7c3aed;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .status-badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      background: var(--card);
      border: 1px solid var(--border);
    }
    
    .status-badge.connected { color: var(--green); border-color: var(--green); }
    .status-badge.disconnected { color: var(--red); border-color: var(--red); }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    .card-title {
      font-size: 0.875rem;
      color: var(--text-dim);
      font-weight: 500;
    }
    
    /* Health Score */
    .health-score {
      text-align: center;
      padding: 2rem 0;
    }
    
    .score-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: conic-gradient(
        var(--accent) calc(var(--score) * 1%),
        var(--border) calc(var(--score) * 1%)
      );
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      position: relative;
    }
    
    .score-inner {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: var(--card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .score-value {
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
    }
    
    .score-label {
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    
    /* Dimensions */
    .dimension {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .dimension:last-child { border-bottom: none; }
    
    .dimension-name {
      font-size: 0.875rem;
    }
    
    .dimension-bar {
      width: 100px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .dimension-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    
    .dimension-fill.green { background: var(--green); }
    .dimension-fill.yellow { background: var(--yellow); }
    .dimension-fill.red { background: var(--red); }
    
    .dimension-value {
      font-size: 0.75rem;
      color: var(--text-dim);
      width: 40px;
      text-align: right;
    }
    
    /* Stats */
    .stat {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .stat:last-child { border-bottom: none; }
    
    .stat-value {
      font-weight: 600;
      color: var(--accent);
    }
    
    /* Recent */
    .recent-item {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .recent-item:last-child { border-bottom: none; }
    
    .recent-type {
      font-size: 0.625rem;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      background: var(--accent-dim);
      color: white;
      margin-right: 0.5rem;
    }
    
    .recent-name {
      font-size: 0.875rem;
      font-weight: 500;
    }
    
    .recent-date {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.25rem;
    }
    
    /* Actions */
    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    
    button {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    button:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
    }
    
    button.primary:hover {
      background: var(--accent-dim);
    }
    
    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-dim);
    }
    
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 0.75rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(1rem);
      transition: all 0.3s;
    }
    
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌀 xiaoxi-dreams <span class="status-badge" id="status">连接中</span></h1>
    </header>
    
    <div class="grid">
      <!-- Health Score Card -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">健康度</span>
        </div>
        <div class="health-score">
          <div class="score-circle" style="--score: 0" id="scoreCircle">
            <div class="score-inner">
              <span class="score-value" id="scoreValue">--</span>
              <span class="score-label">/ 100</span>
            </div>
          </div>
          <p id="scoreMessage">加载中...</p>
        </div>
      </div>
      
      <!-- Dimensions Card -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">维度分析</span>
        </div>
        <div id="dimensions">
          <div class="loading"><div class="spinner"></div>加载中...</div>
        </div>
      </div>
      
      <!-- Stats Card -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">统计</span>
        </div>
        <div id="stats">
          <div class="loading"><div class="spinner"></div>加载中...</div>
        </div>
      </div>
      
      <!-- Recent Memories Card -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">最近记忆</span>
        </div>
        <div id="recent">
          <div class="loading"><div class="spinner"></div>加载中...</div>
        </div>
      </div>
    </div>
    
    <div class="card" style="margin-top: 1.5rem;">
      <div class="card-header">
        <span class="card-title">操作</span>
      </div>
      <div class="actions">
        <button class="primary" onclick="triggerDream()">🌀 触发 Dream</button>
        <button onclick="refreshData()">🔄 刷新</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const API_BASE = 'http://localhost:18792';
    const API_KEY = 'xiaoxi-api-key';
    
    let healthData = null;
    
    async function api(endpoint, options = {}) {
      const res = await fetch(`${API_BASE}${endpoint}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'X-API-Key': API_KEY,
          ...options.headers
        }
      });
      
      if (!res.ok) {
        throw new Error(`API Error: ${res.status}`);
      }
      
      return res.json();
    }
    
    async function loadData() {
      try {
        // Load health
        const health = await api('/health');
        healthData = health;
        updateHealthUI(health);
        
        // Load stats
        const stats = await api('/stats');
        updateStatsUI(stats);
        
        // Load recent memories
        const memResult = await api('/memories?limit=5');
        updateRecentUI(memResult.memories || []);
        
        // Update status
        document.getElementById('status').textContent = '已连接';
        document.getElementById('status').className = 'status-badge connected';
      } catch (e) {
        console.error(e);
        document.getElementById('status').textContent = '未连接';
        document.getElementById('status').className = 'status-badge disconnected';
        showToast('无法连接到 API 服务器', 'error');
      }
    }
    
    function updateHealthUI(health) {
      const score = health.score || 0;
      const circle = document.getElementById('scoreCircle');
      circle.style.setProperty('--score', score);
      
      document.getElementById('scoreValue').textContent = score;
      document.getElementById('scoreMessage').textContent = health.message || '';
    }
    
    function updateDimensionsUI(health) {
      if (!health.dimensions) {
        document.getElementById('dimensions').innerHTML = '<p style="color:var(--text-dim)">暂无数据</p>';
        return;
      }
      
      const dims = [
        { key: 'freshness', name: '新鲜度' },
        { key: 'coverage', name: '覆盖度' },
        { key: 'coherence', name: '连贯度' },
        { key: 'efficiency', name: '效率' },
        { key: 'accessibility', name: '可达性' }
      ];
      
      const html = dims.map(d => {
        const value = health.dimensions[d.key] || 0;
        const pct = Math.round(value * 100);
        const color = pct >= 70 ? 'green' : pct >= 50 ? 'yellow' : 'red';
        return `
          <div class="dimension">
            <span class="dimension-name">${d.name}</span>
            <div class="dimension-bar">
              <div class="dimension-fill ${color}" style="width: ${pct}%"></div>
            </div>
            <span class="dimension-value">${pct}</span>
          </div>
        `;
      }).join('');
      
      document.getElementById('dimensions').innerHTML = html;
    }
    
    function updateStatsUI(stats) {
      document.getElementById('stats').innerHTML = `
        <div class="stat">
          <span>记忆总数</span>
          <span class="stat-value">${stats.memories || 0}</span>
        </div>
        <div class="stat">
          <span>Dream 总次数</span>
          <span class="stat-value">${stats.dreams || 0}</span>
        </div>
        <div class="stat">
          <span>7天平均健康度</span>
          <span class="stat-value">${stats.avgHealth || 0}</span>
        </div>
      `;
    }
    
    function updateRecentUI(memories) {
      if (!memories.length) {
        document.getElementById('recent').innerHTML = '<p style="color:var(--text-dim)">暂无记忆</p>';
        return;
      }
      
      const html = memories.map(m => `
        <div class="recent-item">
          <span class="recent-type">${m.type || 'fact'}</span>
          <span class="recent-name">${m.name || m.summary || '无标题'}</span>
          <div class="recent-date">${m.created_at || ''}</div>
        </div>
      `).join('');
      
      document.getElementById('recent').innerHTML = html;
    }
    
    async function triggerDream() {
      try {
        showToast('触发 Dream...', 'info');
        await api('/dreams/trigger', {
          method: 'POST',
          body: JSON.stringify({ mode: 'standard', days: 7 })
        });
        showToast('Dream 已触发', 'success');
      } catch (e) {
        showToast('触发失败: ' + e.message, 'error');
      }
    }
    
    function refreshData() {
      loadData();
      showToast('刷新中...', 'info');
    }
    
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // Load on start
    loadData();
    
    // Auto refresh every 30s
    setInterval(loadData, 30000);
  </script>
</body>
</html>
