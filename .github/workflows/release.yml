name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Update VERSION file
        run: |
          echo ${{ steps.version.outputs.version }} > VERSION

      - name: Generate release notes
        id: release-notes
        run: |
          # Extract changelog section for this version
          VERSION=${{ steps.version.outputs.version }}
          
          # Get content between this version and next version (or end)
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (extracted) exit
              if ($2 == "["ver"]") {
                extracted=1
                next
              }
            }
            extracted { print }
          ' CHANGELOG.md)
          
          # Fallback if no specific notes found
          if [ -z "$NOTES" ]; then
            NOTES="Version $VERSION release"
          fi
          
          echo "notes=$NOTES" >> $GITHUB_OUTPUT
          echo "$NOTES" > release_notes.md

      - name: Update package.json
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version 2>/dev/null || true

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json package-lock.json 2>/dev/null || true
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || true
          git push || echo "Push failed, continuing"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report
        if: always()
        run: |
          echo "Release ${{ steps.version.outputs.version }} created"
