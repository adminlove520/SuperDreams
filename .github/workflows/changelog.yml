name: Changelog

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
      - 'SKILLS/**'
      - 'scripts/**'
      - 'docs/**'
      - '!CHANGELOG.md'
      - '!README.md'

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/v//')
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get changed files
        id: changes
        run: |
          # Get changed files as comma-separated list (GITHUB_OUTPUT format requires single line)
          CHANGES=$(git diff --name-only HEAD~1 HEAD | tr '\n' ',' | sed 's/,$//')
          echo "files=$CHANGES" >> $GITHUB_OUTPUT

      - name: Generate changelog entry
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DATE=$(date +'%Y-%m-%d')
          FILES=${{ steps.changes.outputs.files }}
          
          # Convert comma-separated back to array for checking
          IFS=',' read -ra FILE_ARRAY <<< "$FILES"
          
          # Generate changelog entry based on changes
          ENTRY="## [$VERSION] - $DATE\n\n"
          
          for file in "${FILE_ARRAY[@]}"; do
            case "$file" in
              SKILLS/*) HAS_SKILLS=1 ;;
              docs/*) HAS_DOCS=1 ;;
              scripts/*) HAS_SCRIPTS=1 ;;
              *ARCHITECTURE*) HAS_ARCH=1 ;;
              server.js|web/*|api/*) HAS_WEB=1 ;;
            esac
          done
          
          [ -n "$HAS_SKILLS" ] && ENTRY+="### Skills\n- SKILL updates\n"
          [ -n "$HAS_DOCS" ] && ENTRY+="### Docs\n- Documentation updates\n"
          [ -n "$HAS_SCRIPTS" ] && ENTRY+="### Scripts\n- Script improvements\n"
          [ -n "$HAS_ARCH" ] && ENTRY+="### Architecture\n- Architecture improvements\n"
          [ -n "$HAS_WEB" ] && ENTRY+="### Web\n- Web UI/Server updates\n"
          
          ENTRY+="\n"
          
          # Prepend to CHANGELOG.md
          {
            head -n 5 CHANGELOG.md
            echo -e "$ENTRY"
            tail -n +6 CHANGELOG.md
          } > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: auto-update changelog" || echo "Nothing to commit"
          git push || echo "Push failed, continuing..."

      - name: Report
        if: always()
        run: |
          echo "Changelog updated for version ${{ steps.version.outputs.version }}"
          echo "Changed files: ${{ steps.changes.outputs.files }}"
